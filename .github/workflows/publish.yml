name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Wheels / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 — glibc (most servers, VMs)
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux x86_64 — musl (Alpine Docker)
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_x86_64
          # Linux aarch64 — glibc (AWS Graviton, Docker on Apple Silicon)
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # Linux aarch64 — musl (Alpine Docker on ARM)
          - name: linux-aarch64-musl
            os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_aarch64
          # macOS universal2 — fat binary covering both Intel and Apple Silicon
          - name: macos-universal2
            os: macos-latest
            target: universal2-apple-darwin
            manylinux: auto
          # Windows x86_64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64
            manylinux: auto
    steps:
      - uses: actions/checkout@v4
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: false  # Remove this line and configure PyPI trusted publishing when ready to publish
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
