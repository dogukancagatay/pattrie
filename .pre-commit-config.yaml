repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        language: system
        entry: uv run ty check
        types: [python]
        pass_filenames: false

      - id: stubtest
        name: stubtest (verify .pyi matches compiled extension)
        language: system
        entry: uv run python -m mypy.stubtest pattrie._pattrie --allowlist .stubtest-allowlist
        pass_filenames: false
        files: '^pattrie/.*\.pyi$'
