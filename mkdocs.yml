site_name: pattrie
site_description: Fast IP prefix lookup library with Rust backend
site_url: https://dogukancagatay.github.io/pattrie/
repo_url: https://github.com/dogukancagatay/pattrie
repo_name: dogukancagatay/pattrie

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            docstring_style: google
            docstring_section_style: table
            heading_level: 2
  - mike:
      alias_type: symlink
      canonical_version: latest

nav:
  - Home: index.md
  - API Reference: api.md

extra:
  version:
    provider: mike
